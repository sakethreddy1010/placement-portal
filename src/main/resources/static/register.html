<!DOCTYPE html>
<html>
	<head>
	<title>Student Register</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

	</head>

<body>
	<nav style="background:#333;padding:10px">

	<a href="login.html" style="color:white;margin-right:20px">Login</a>

	<a href="register.html" style="color:white;margin-right:20px">Register</a>

	<a href="jobs.html" style="color:white;margin-right:20px">Jobs</a>

	<a href="myapplications.html" style="color:white;margin-right:20px">My Applications</a>

	<a href="dashboard.html" style="color:white">Admin Dashboard</a>

	</nav>

	<div class="container mt-5" style="max-width:400px">

	<h2 class="text-center mb-4">Student Registration</h2>

	<input id="name" class="form-control mb-3" placeholder="Name">

	<input id="email" class="form-control mb-3" placeholder="Email">

	<input id="password" class="form-control mb-3" placeholder="Password">

	<input id="branch" class="form-control mb-3" placeholder="Branch">

	<button onclick="register()" class="btn btn-primary w-100">
	Register
	</button>

	</div>

<script>

function register(){

fetch("http://localhost:8080/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value,
branch:document.getElementById("branch").value
})
})
.then(res=>res.json())
.then(data=>alert("Registration Successful"))

}

</script>

</body>
</html>
